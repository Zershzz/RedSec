<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>[CLASSIFIED] REDSEC OPS TERMINAL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Russo+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            min-height: 100vh;
            padding: 60px 30px;
            background: var(--black);
        }
        
        .admin-login {
            max-width: 600px;
            margin: 100px auto;
            background: var(--gray-darkest);
            border: 2px solid var(--red-primary);
            padding: 50px;
            clip-path: polygon(30px 0%, 100% 0%, calc(100% - 30px) 100%, 0% 100%);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .access-denied {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid var(--red-primary);
            color: var(--red-primary);
            padding: 15px;
            margin-bottom: 30px;
            font-family: var(--font-mono);
            font-size: 13px;
            text-align: center;
            letter-spacing: 1px;
        }
        
        .login-title {
            font-family: var(--font-display);
            font-size: 32px;
            color: var(--red-primary);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        
        .login-subtitle {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--gray-light);
            letter-spacing: 2px;
        }
        
        .login-form .form-group {
            margin-bottom: 25px;
        }
        
        .login-form label {
            display: block;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--gray-light);
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .login-form input {
            width: 100%;
            padding: 15px;
            background: var(--gray-dark);
            border: 1px solid var(--gray-medium);
            color: var(--white);
            font-family: var(--font-mono);
            font-size: 14px;
        }
        
        .login-form input:focus {
            outline: none;
            border-color: var(--red-primary);
        }
        
        .login-btn {
            width: 100%;
            padding: 18px;
            background: var(--red-primary);
            color: var(--white);
            border: none;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-btn:hover {
            background: var(--red-bright);
        }
        
        .admin-dashboard {
            max-width: 1600px;
            margin: 0 auto;
            display: none;
        }
        
        .admin-dashboard.active {
            display: block;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--red-primary);
        }
        
        .dashboard-title {
            font-family: var(--font-display);
            font-size: 36px;
            letter-spacing: 2px;
        }
        
        .logout-btn {
            padding: 12px 25px;
            background: transparent;
            border: 1px solid var(--red-primary);
            color: var(--red-primary);
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: var(--red-primary);
            color: var(--white);
        }
        
        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--gray-darkest);
            border: 1px solid var(--gray-medium);
            padding: 25px;
            text-align: center;
        }
        
        .stat-card-value {
            font-family: var(--font-display);
            font-size: 42px;
            color: var(--red-primary);
            margin-bottom: 10px;
        }
        
        .stat-card-label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--gray-light);
            letter-spacing: 1px;
        }
        
        .admin-controls {
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
        }
        
        .add-tool-btn {
            padding: 15px 30px;
            background: var(--red-primary);
            color: var(--white);
            border: none;
            font-family: var(--font-mono);
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .add-tool-btn:hover {
            background: var(--red-bright);
        }
        
        .tool-form-container {
            background: var(--gray-darkest);
            border: 1px solid var(--gray-medium);
            padding: 40px;
            margin-bottom: 40px;
            display: none;
        }
        
        .tool-form-container.active {
            display: block;
        }
        
        .tool-form-title {
            font-family: var(--font-display);
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--red-primary);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .admin-table {
            width: 100%;
            background: var(--gray-darkest);
            border-collapse: collapse;
        }
        
        .admin-table th {
            background: var(--gray-dark);
            color: var(--red-primary);
            padding: 15px;
            text-align: left;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--red-primary);
        }
        
        .admin-table td {
            padding: 15px;
            border-bottom: 1px solid var(--gray-medium);
            color: var(--white-dim);
            font-size: 14px;
        }
        
        .admin-table tr:hover {
            background: rgba(255, 0, 0, 0.05);
        }
        
        .action-btn {
            padding: 8px 15px;
            background: var(--gray-dark);
            border: 1px solid var(--gray-medium);
            color: var(--white);
            font-family: var(--font-mono);
            font-size: 11px;
            cursor: pointer;
            margin-right: 5px;
            transition: all 0.3s;
        }
        
        .action-btn.edit {
            border-color: var(--cyan-tactical);
            color: var(--cyan-tactical);
        }
        
        .action-btn.delete {
            border-color: var(--red-primary);
            color: var(--red-primary);
        }
        
        .action-btn:hover {
            transform: scale(1.05);
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 1px;
        }
        
        .status-badge.active {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid var(--green-tactical);
            color: var(--green-tactical);
        }
        
        .status-badge.inactive {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid var(--red-primary);
            color: var(--red-primary);
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="noise"></div>

    <div class="admin-container">
        <!-- Login Screen -->
        <div class="admin-login" id="admin-login">
            <div class="login-header">
                <div class="login-title">CLASSIFIED ACCESS</div>
                <div class="login-subtitle">REDSEC OPERATIONS TERMINAL</div>
            </div>
            
            <div class="access-denied" id="error-message" style="display: none;">
                ⚠️ ACCESS DENIED - INVALID CREDENTIALS
            </div>
            
            <form class="login-form" id="login-form">
                <div class="form-group">
                    <label>OPERATOR ID</label>
                    <input type="text" id="username" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label>CLEARANCE CODE</label>
                    <input type="password" id="password" autocomplete="off" required>
                </div>
                <button type="submit" class="login-btn">▶ AUTHENTICATE</button>
            </form>
        </div>

        <!-- Admin Dashboard -->
        <div class="admin-dashboard" id="admin-dashboard">
            <div class="dashboard-header">
                <div>
                    <div class="dashboard-title">OPERATIONS TERMINAL</div>
                    <div style="font-family: var(--font-mono); font-size: 12px; color: var(--gray-light); margin-top: 10px;">
                        LOGGED IN AS: <span id="current-user" style="color: var(--red-primary);"></span>
                    </div>
                </div>
                <button class="logout-btn" id="logout-btn">◀ LOGOUT</button>
            </div>

            <div class="stats-dashboard">
                <div class="stat-card">
                    <div class="stat-card-value" id="total-tools">0</div>
                    <div class="stat-card-label">TOTAL TOOLS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" id="active-tools">0</div>
                    <div class="stat-card-label">ACTIVE</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" id="total-downloads">0</div>
                    <div class="stat-card-label">TOTAL DL</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-value" style="color: var(--green-tactical);">SECURE</div>
                    <div class="stat-card-label">SYSTEM STATUS</div>
                </div>
            </div>

            <div class="admin-controls">
                <button class="add-tool-btn" id="add-tool-btn">+ ADD NEW TOOL</button>
            </div>

            <!-- Tool Form -->
            <div class="tool-form-container" id="tool-form-container">
                <div class="tool-form-title" id="form-title">ADD NEW TOOL</div>
                <form id="tool-form">
                    <input type="hidden" id="edit-tool-id">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>TOOL NAME *</label>
                            <input type="text" id="tool-name" required>
                        </div>
                        <div class="form-group">
                            <label>VERSION *</label>
                            <input type="text" id="tool-version" placeholder="1.0.0" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>DESCRIPTION *</label>
                        <textarea id="tool-description" rows="3" style="width: 100%; padding: 15px; background: var(--gray-dark); border: 1px solid var(--gray-medium); color: var(--white); font-family: var(--font-body);" required></textarea>
                    </div>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label>CATEGORY *</label>
                            <select id="tool-category" style="width: 100%; padding: 15px; background: var(--gray-dark); border: 1px solid var(--gray-medium); color: var(--white); font-family: var(--font-body);" required>
                                <option value="network">NETWORK OPS</option>
                                <option value="web">WEB EXPLOIT</option>
                                <option value="forensics">DIGITAL FORENSICS</option>
                                <option value="exploit">EXPLOITATION</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>FILE SIZE</label>
                            <input type="text" id="tool-size" placeholder="5.2 MB">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>PLATFORMS (comma separated)</label>
                        <input type="text" id="tool-platforms" placeholder="Linux, Windows, macOS">
                    </div>
                    
                    <div class="form-group">
                        <label style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" id="tool-classified" style="width: auto;">
                            <span>CLASSIFIED TOOL</span>
                        </label>
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-top: 30px;">
                        <button type="submit" class="add-tool-btn">SAVE TOOL</button>
                        <button type="button" class="logout-btn" id="cancel-btn">CANCEL</button>
                    </div>
                </form>
            </div>

            <!-- Tools Table -->
            <div style="background: var(--gray-darkest); border: 1px solid var(--gray-medium); padding: 30px;">
                <h3 style="font-family: var(--font-display); font-size: 24px; margin-bottom: 25px; color: var(--red-primary);">ARSENAL MANAGEMENT</h3>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>TOOL NAME</th>
                            <th>VERSION</th>
                            <th>CATEGORY</th>
                            <th>DOWNLOADS</th>
                            <th>STATUS</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="tools-table-body">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="admin.js"></script>
</body>
</html>
